<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Content Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1 class="mb-4">AI Content Engine</h1>

      <div class="mb-3">
        <label for="topic" class="form-label">Topic</label>
        <input id="topic" class="form-control" placeholder="Enter a medical topic (e.g. asthma, diabetes)" />
      </div>
      <button id="generateBtn" class="btn btn-primary mb-4">Generate</button>

      <h2>Contents</h2>
      <table class="table table-striped" id="contentsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Topic</th>
            <th>Script</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      async function loadContents(){
        const res = await fetch('/contents');
        const data = await res.json();
        const tbody = document.querySelector('#contentsTable tbody');
        tbody.innerHTML = '';
        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.topic}</td>
            <td>${row.script}</td>
            <td>${row.status}</td>
            <td><button class="btn btn-sm btn-success" onclick="setStatus(${row.id}, 'posted')">Mark Posted</button></td>
          `;
          tbody.appendChild(tr);
        })
      }

      async function setStatus(id, status){
        await fetch(`/status/${id}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}) });
        loadContents();
      }

      document.getElementById('generateBtn').addEventListener('click', async ()=>{
        const topic = document.getElementById('topic').value;
        const t = (topic || '').trim();
        if(!t) return alert('Enter a topic');
        if(t.length > 100) return alert('Topic too long (max 100 chars)');
        const res = await fetch('/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({topic: t})});
        const body = await res.json();
        alert('Generated content id: ' + body.id);
        // poll until status becomes posted or failed
        const start = Date.now();
        const poll = setInterval(async ()=>{
          const r = await fetch('/contents');
          const rows = await r.json();
          const item = rows.find(x=>x.id === body.id);
          if(item){
            if(item.status === 'posted' || item.status === 'failed'){
              clearInterval(poll);
              loadContents();
            }
            // stop polling after 30s
            if(Date.now() - start > 30000) clearInterval(poll);
          }
        }, 1500);
      })

      loadContents();
    </script>
  </body>
</html>
