name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    name: Lint, Test, Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-content-engine/requirements.txt

      - name: Lint (flake8)
        run: |
          python -m pip install flake8
          flake8 ai-content-engine || true

      - name: Run tests (pytest)
        run: |
          python -m pip install pytest
          pytest -q ai-content-engine || true

      - name: Dockerfile smoke build
        run: |
          docker build --pull -t ai-content-engine:ci ai-content-engine/
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-content-engine/requirements.txt
      - name: Run linter (flake8)
        run: |
          python -m pip install flake8
          flake8 ai-content-engine || true
      - name: Run tests
        run: |
          python -m pip install pytest
          pytest -q ai-content-engine || true
