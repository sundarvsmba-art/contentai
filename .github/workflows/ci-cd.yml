name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-content-engine/requirements.txt

      - name: Run Flake8 Linter
        run: |
          pip install flake8
          flake8 ai-content-engine || true

      - name: Run Pytest
        run: |
          pip install pytest
          pytest -q ai-content-engine || true

      - name: Docker Build Test
        run: |
          docker build --pull -t ai-content-engine:ci ai-content-engine/

  cd:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      - name: Sync Files to Server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            ./ai-content-engine/ $SERVER_USER@$SERVER_HOST:$SERVER_APP_DIR

      - name: Deploy Application
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
            cd $SERVER_APP_DIR
            docker compose down
            docker compose build
            docker compose run --rm backend alembic upgrade head
            docker compose up -d
            docker image prune -f
          EOF
