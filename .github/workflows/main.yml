name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint, Test, Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-content-engine/requirements.txt

      - name: Lint (flake8)
        run: |
          python -m pip install flake8
          flake8 ai-content-engine || true

      - name: Run tests (pytest)
        run: |
          python -m pip install pytest
          pytest -q ai-content-engine || true

      - name: Build Docker image (smoke build)
        run: |
          # Build the backend image to ensure Dockerfile builds successfully
          docker build --pull -t ai-content-engine:ci ai-content-engine/
